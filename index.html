<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA28 — Los Angeles XXVIII Olympiad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <!-- LA Logo -->
    <div class="la-logo">
      <img src="media/Logos/LA logo.svg" alt="LA28 Logo">
    </div>

    <!-- Athletes -->
    <div class="athletes">
      <img src="media/Athelets/Run 1_V3.png" alt="Athlete" class="athlete athlete-left">
      <img src="media/Athelets/Run 1_V1.png" alt="Athlete" class="athlete athlete-right">
    </div>

    <!-- Center Text -->
    <div class="center-text">
      <div class="line-with-text">
        <span class="rule"></span>
        <div class="text-block">
          <span class="title-line">LOS ANGELES XXVIII</span>
          <span class="title-line">XXXIV<sup>th</sup> OLYMPIAD</span>
        </div>
        <span class="rule"></span>
      </div>
    </div>

    <!-- Olympic Rings -->
    <div class="olympic-rings">
      <img src="media/Logos/Olympic Logo.svg" alt="Olympic Rings">
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
