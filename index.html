<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA28 — Los Angeles XXVIII Olympiad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <!-- LA Logo -->
    <div class="la-logo">
      <img src="media/Logos/LA logo.svg" alt="LA28 Logo">
    </div>

    <!-- Athletes -->
    <img src="media/Athelets/Run 1_V3.png" alt="Athlete" class="athlete athlete-left">
    <img src="media/Athelets/Run 1_V1.png" alt="Athlete" class="athlete athlete-right">

    <!-- Center Wordmark -->
    <div class="center-text">
      <span class="rule"></span>
      <img src="media/Logos/Wordmark.svg" alt="Los Angeles XXVIII XXXIVth Olympiad" class="wordmark">
      <span class="rule"></span>
    </div>

    <!-- Olympic Rings -->
    <div class="olympic-rings">
      <img src="media/Logos/Olympic Logo.svg" alt="Olympic Rings">
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
