<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA28 — Los Angeles XXVIII Olympiad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Fixed LA Logo -->
  <div class="la-logo">
    <img src="media/Logos/LA logo.svg" alt="LA28 Logo">
  </div>

  <!-- Fixed Olympic Rings -->
  <div class="olympic-rings">
    <img src="media/Logos/Olympic Logo.svg" alt="Olympic Rings">
  </div>

  <section class="hero">
    <!-- Athletes layered -->
    <img src="media/Athelets/Run 1.png" alt="Athlete" class="athlete athlete-1">
    <img src="media/Athelets/Run 2.png" alt="Athlete" class="athlete athlete-2">
    <img src="media/Athelets/Run 3.png" alt="Athlete" class="athlete athlete-3">

    <!-- Center Wordmark with line through -->
    <div class="center-text">
      <div class="rule-line"></div>
      <img src="media/Logos/Wordmark.svg" alt="Los Angeles XXVIII XXXIVth Olympiad" class="wordmark">
    </div>
  </section>

  <section class="section-2">
  </section>

  <script src="script.js"></script>
</body>
</html>
